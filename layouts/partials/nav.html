<div class="top-0 z-50 w-full sticky nav-glass">
    <div x-data="{ open: false }"
         class="flex flex-col max-w-7xl px-4 mx-auto md:items-center md:justify-between md:flex-row md:px-6 lg:px-8">
        <div class="flex flex-row items-center justify-between py-4">
            <a href="/" class="flex items-center gap-3 text-gray-100 transition-opacity hover:opacity-75">
                <img src="/images/tforce_logo.png"
                     class="h-8 w-8"
                     alt="{{ .Site.Title }}" />
                <div class="text-base font-bold tracking-tight text-white uppercase">
                    {{ .Site.Title }}
                </div>
            </a>
            <button class="rounded-lg md:hidden focus:outline-none focus:ring-2 focus:ring-primary-500 p-1" @click="open = !open" role="navigation" aria-expanded="false" aria-label="Main" aria-controls="menuItems">
                <svg fill="currentColor" viewBox="0 0 20 20" class="w-5 h-5 text-gray-300">
                    <path x-show="!open" fill-rule="evenodd"
                          d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM9 15a1 1 0 011-1h6a1 1 0 110 2h-6a1 1 0 01-1-1z"
                          clip-rule="evenodd"></path>
                    <path x-show="open" fill-rule="evenodd"
                          d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                          clip-rule="evenodd"></path>
                </svg>
            </button>
        </div>
        <nav :class="{'flex': open, 'hidden': !open}"
             class="flex-col flex-grow hidden pb-4 md:pb-0 md:flex md:justify-end md:flex-row md:items-center">
            {{ range site.Menus.main }}
            {{ if (eq "complexdropdown" .Pre) }}
            <div @click.away="open = false" class="relative" x-data="{ open: false }">
                <button @click="open = !open"
                        class="flex flex-row items-center w-full px-4 py-2 mt-2 text-sm font-medium text-gray-300 rounded-lg md:w-auto md:inline md:mt-0 md:ml-2 hover:text-white hover:bg-white/10 transition-colors">
                    <span>{{ .Name }}</span>
                    <svg fill="currentColor" viewBox="0 0 20 20" :class="{'rotate-180': open, 'rotate-0': !open}"
                         class="inline w-4 h-4 mt-1 ml-1 transition-transform duration-200 transform md:-mt-1">
                        <path fill-rule="evenodd"
                              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                              clip-rule="evenodd"></path>
                    </svg>
                </button>
                <div x-show="open" x-transition:enter="transition ease-out duration-100"
                     x-transition:enter-start="transform opacity-0 scale-95"
                     x-transition:enter-end="transform opacity-100 scale-100"
                     x-transition:leave="transition ease-in duration-75"
                     x-transition:leave-start="transform opacity-100 scale-100"
                     x-transition:leave-end="transform opacity-0 scale-95"
                     class="absolute right-0 z-30 w-full mt-2 origin-top-right md:max-w-sm md:w-screen">
                    <div class="px-2 pt-2 pb-4 bg-gray-900 rounded-xl shadow-2xl border border-white/10">
                        <div class="grid grid-cols-1 gap-2">
                            {{ range (index site.Menus .Identifier) }}
                            <a class="flex items-start p-3 rounded-lg hover:bg-white/10 transition-colors"
                               href="{{ .URL | absLangURL }}">
                                <div class="ml-3">
                                    <p class="font-semibold text-white text-sm">{{ .Name }}</p>
                                    <p class="text-xs text-gray-400">{{ .Post }}</p>
                                </div>
                            </a>
                            {{ end }}
                        </div>
                    </div>
                </div>
            </div>
            {{ else }}
            <a class="px-4 py-2 mt-2 text-sm font-medium text-gray-300 rounded-lg md:mt-0 md:ml-1 hover:text-white hover:bg-white/10 transition-colors"
                href="{{ .URL | absLangURL }}" title="{{ .Title | default .Name }}">
                {{ .Name }}
            </a>
            {{ end }}
            {{ end }}
            <a href="/contact/"
               class="ml-3 mt-2 md:mt-0 px-4 py-2 text-sm font-semibold text-white btn-primary rounded-lg hidden md:block">
                Get in Touch
            </a>
            {{ if not .Site.Params.Disable_theme_toggle }}
            <button id="theme-toggle" type="button"
                    class="p-2 ml-2 text-sm text-gray-400 rounded-lg hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
                <svg id="theme-toggle-dark-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                </svg>
                <svg id="theme-toggle-light-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-label="Toggle theme">
                    <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                          fill-rule="evenodd" clip-rule="evenodd"></path>
                </svg>
            </button>
            {{ end }}
        </nav>
    </div>
</div>
