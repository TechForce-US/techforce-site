<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
{{ $js := resources.Get "js/darkmode.js" | js.Build }}
<script src="{{ $js.RelPermalink }}" defer></script>
<footer class="bg-[#050510] border-t border-white/5">
    <div class="max-w-7xl px-4 py-12 mx-auto sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
            <a href="/" class="flex items-center gap-3">
                <img src="/images/tforce_logo.png" class="h-7 w-7 opacity-80" alt="{{ .Site.Title }}" />
                <span class="text-sm font-bold text-white/60 uppercase tracking-tight">{{ .Site.Title }}</span>
            </a>
            <nav class="flex flex-wrap gap-x-6 gap-y-2">
                {{ range site.Menus.footer }}
                <a href="{{ .URL | absLangURL }}" class="text-sm text-gray-500 hover:text-gray-300 transition-colors">{{ .Name }}</a>
                {{ end }}
            </nav>
        </div>
        <div class="mt-8 pt-8 border-t border-white/5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <p class="text-xs text-gray-600">&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.</p>
            <p class="text-xs text-gray-600">Kansas-Based Technology Services &amp; Products</p>
        </div>
    </div>
</footer>
