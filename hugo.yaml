baseURL: ''
title: Tech Force LLC
locale: en-us
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: true
canonifyURLs: true
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true
staticDir:
  - static

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Tech Force LLC
  authorimage: ../assets/images/global/author.webp
  og_image: /images/tailbliss-cover.png
  moto: "Fractional CTO · Custom Software · AI Strategy"
  description: "Tech Force LLC delivers senior-level engineering and strategic technical leadership to startups and SMBs — at a fraction of the cost of a full-time hire. Fractional CTO, custom software development, and AI consulting."
  disable_theme_toggle: false
  disable_stay_uptodate: true

  social_media:
    github:
      enabled: false
      url: 'https://github.com/techforcellc'
    facebook:
      enabled: false
      url: ''
    instagram:
      enabled: false
      url: ''
    twitter:
      enabled: false
      url: ''

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: services
      name: Services
      url: /services/
      weight: 20
    - identifier: products
      name: Products
      url: /products/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50
  footer:
    - identifier: home
      name: Home
      url: /
      weight: 10
    - identifier: services
      name: Services
      url: /services/
      weight: 20
    - identifier: products
      name: Products
      url: /products/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50

taxonomies:
  category: Categories
  tag: Tags

privacy:
  disqus:
    disable: false
  googleAnalytics:
    anonymizeIP: true
    disable: false
    respectDoNotTrack: false
    useSessionStorage: false
  instagram:
    disable: false
    simple: false
  twitter:
    disable: false
    enableDNT: false
    simple: false
  youtube:
    disable: false
    privacyEnhanced: true

module:
  hugoVersion:
    extended: true
    min: "0.104.0"
